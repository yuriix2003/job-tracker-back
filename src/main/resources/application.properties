# Server Configuration
server.port=${PORT:8080}

# Database Configuration (works both locally and on Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobtracker}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:yourpassword}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:YourSecretKeyMustBeAtLeast256BitsLongForHS256AlgorithmToWorkProperlyMakeItVeryLongAndSecure}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Firebase Storage
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:src/main/resources/firebase-service-account.json}

# Cloudflare Workers AI
cloudflare.account.id=${CLOUDFLARE_ACCOUNT_ID:}
cloudflare.api.token=${CLOUDFLARE_API_TOKEN:}

# Brevo Email
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:noreply@jobtracker.com}
brevo.sender.name=${BREVO_SENDER_NAME:Job Tracker}

# Logging
logging.level.com.yashfi.job.job_apps=INFO