services:
  # PostgreSQL Database
  - type: pserv
    name: jobtracker-db
    env: docker
    plan: free
    databaseName: jobtracker
    databaseUser: jobtracker_user

  # Spring Boot Application
  - type: web
    name: jobtracker-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/test/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobtracker-db
          property: connectionString
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: jobtracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: /app/firebase-service-account.json
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Job Tracker